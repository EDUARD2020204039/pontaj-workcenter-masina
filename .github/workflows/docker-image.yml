name: Build client and publish Docker image

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  windows-client:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.app-version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-client.txt

      - name: Read application version
        id: app-version
        shell: pwsh
        run: '"value=$((Get-Content VERSION -Raw).Trim())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append'

      - name: Install Python dependencies
        run: python -m pip install -r requirements-client.txt

      - name: Download official Microsoft prerequisites
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force drivers | Out-Null
          Invoke-WebRequest "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "drivers/vc_redist.x64.exe"
          Invoke-WebRequest "https://go.microsoft.com/fwlink/?linkid=2358430" -OutFile "drivers/msodbcsql.msi"

      - name: Generate Windows version metadata
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          $version = "${{ steps.app-version.outputs.value }}"
          $parts = @($version.Split('.') | ForEach-Object { [int]$_ })
          while ($parts.Count -lt 4) { $parts += 0 }
          $fileVersion = "$($parts[0]), $($parts[1]), $($parts[2]), $($parts[3])"
          @"
VSVersionInfo(
  ffi=FixedFileInfo(
    filevers=($fileVersion),
    prodvers=($fileVersion),
    mask=0x3f,
    flags=0x0,
    OS=0x40004,
    fileType=0x1,
    subtype=0x0,
    date=(0, 0)
  ),
  kids=[
    StringFileInfo([
      StringTable(
        '041804b0',
        [
          StringStruct('CompanyName', 'HABA Productie'),
          StringStruct('FileDescription', 'WorkCenter Pontaj'),
          StringStruct('FileVersion', '$version'),
          StringStruct('InternalName', 'WorkCenterPontaj'),
          StringStruct('OriginalFilename', 'WorkCenterPontaj.exe'),
          StringStruct('ProductName', 'WorkCenter Pontaj'),
          StringStruct('ProductVersion', '$version')
        ]
      )
    ]),
    VarFileInfo([VarStruct('Translation', [1048, 1200])])
  ]
)
          "@ | Set-Content -Path build/version_info.txt -Encoding UTF8

      - name: Build single-file Windows client
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --noupx --onefile --windowed `
            --name WorkCenterPontaj `
            --icon card.ico `
            --version-file build/version_info.txt `
            --add-data "card.ico;." `
            --add-data "VERSION;." `
            --add-data "drivers;drivers" `
            --hidden-import smartcard.scard._scard `
            maintk.py

      - name: Smoke test Windows client
        shell: pwsh
        run: |
          $marker = Join-Path $env:RUNNER_TEMP "workcenter-smoke.txt"
          Remove-Item -LiteralPath $marker -Force -ErrorAction SilentlyContinue
          $process = Start-Process -FilePath "dist/WorkCenterPontaj.exe" -ArgumentList @("--smoke-test", $marker) -PassThru
          $deadline = (Get-Date).AddSeconds(30)
          while ((Get-Date) -lt $deadline) {
            if (Test-Path -LiteralPath $marker) {
              Get-Content -LiteralPath $marker
              Get-Process WorkCenterPontaj -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
              exit 0
            }
            Start-Sleep -Milliseconds 500
          }
          Get-Process WorkCenterPontaj -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          throw "WorkCenterPontaj.exe smoke test did not create marker file."

      - name: Upload Windows client
        uses: actions/upload-artifact@v4
        with:
          name: workcenter-windows-client
          path: dist/WorkCenterPontaj.exe
          if-no-files-found: error

  docker:
    needs: windows-client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows client
        uses: actions/download-artifact@v4
        with:
          name: workcenter-windows-client
          path: downloads

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/unraidg5/workcenterpontare:latest
            ghcr.io/unraidg5/workcenterpontare:${{ needs.windows-client.outputs.version }}
            ghcr.io/unraidg5/workcenterpontare:${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ needs.windows-client.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
