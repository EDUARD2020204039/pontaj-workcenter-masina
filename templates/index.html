<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Pontaj Zilnic</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<select id="workcenter-select" style="margin-bottom:20px; padding:8px; font-size:16px;">
    <option value="">-- Selectează WorkCenter --</option>
</select>

    <div class="container">
        <h1>Pontaj Zilnic – NFC</h1>
        <p id="info">📶 Aștept scanarea cardului NFC...</p>
        <p id="nume" style="font-size: 24px; font-weight: bold;"></p>
        <p id="mesaj" style="font-size: 18px; color: green;"></p>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const wcSelect = document.getElementById('workcenter-select');

    fetch('/workcenters')
        .then(response => response.json())
        .then(workcenters => {
            workcenters.forEach(wc => {
                const opt = document.createElement('option');
                opt.value = wc.id;
                opt.textContent = wc.denumire;
                wcSelect.appendChild(opt);
            });

            const savedWC = localStorage.getItem('selectedWorkCenter');
            if (savedWC) {
                wcSelect.value = savedWC;
            }
        });

    wcSelect.addEventListener('change', function () {
        localStorage.setItem('selectedWorkCenter', this.value);
    });

    // 🔌 Conectare automată la extensia NFC D-Logic
    const socket = new WebSocket("ws://localhost:27865");

    socket.onopen = () => {
        document.getElementById("info").innerText = "📶 Cititor NFC conectat (D-Logic)";
        console.log("✅ WebSocket NFC conectat");
    };

    socket.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);
            if (data && data.card && data.card.uid) {
                const uid = data.card.uid.trim().replace(/\s+/g, '');
                console.log("🔐 UID citit:", uid);
                trimiteScan(uid);
            }
        } catch (err) {
            console.error("❌ Eroare UID:", err);
        }
    };

    socket.onerror = (err) => {
        console.error("❌ Eroare la conectarea la NFC:", err);
        document.getElementById("info").innerText = "❌ Nu s-a putut conecta la extensia NFC.";
    };
});

function trimiteScan(uid) {
    const selectedWorkCenter = localStorage.getItem('selectedWorkCenter');
    if (!selectedWorkCenter) {
        alert("Te rog selectează WorkCenter-ul!");
        return;
    }

    const url = `/scan?workcenter_id=${selectedWorkCenter}&uid=${uid}`;
    console.log("📤 Trimitem către server:", url);

    fetch(url)
        .then(res => res.json())
        .then(data => {
            const mesajEl = document.getElementById("mesaj");
            document.getElementById("nume").innerText = `${data.nume || ""} ${data.prenume || ""}`;
            mesajEl.innerText = data.message;
            mesajEl.style.color = data.message.includes("5 secunde") ? "red" : "green";
        })
        .catch(err => {
            document.getElementById("mesaj").innerText = "❌ Eroare la trimitere.";
            console.error(err);
        });
}
</script>




</body>
</html>
